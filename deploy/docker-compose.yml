services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: byteorder
      POSTGRES_USER: byteorder
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-byteorder}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U byteorder"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  menu-service:
    build:
      context: ../menu-service
    image: ghcr.io/matts-baps/byteorder/menu-service:latest
    environment:
      DATABASE_URL: postgresql://byteorder:${POSTGRES_PASSWORD:-byteorder}@postgres:5432/byteorder
      AUTH_MODE: ${AUTH_MODE:-self-hosted}
      DEFAULT_KITCHEN_ID: ${DEFAULT_KITCHEN_ID:-default}
      DEFAULT_KITCHEN_SLUG: ${DEFAULT_KITCHEN_SLUG:-default}
      OTEL_ENDPOINT: ${OTEL_ENDPOINT:-}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:9000:8000"

  order-service:
    build:
      context: ../order-service
    image: ghcr.io/matts-baps/byteorder/order-service:latest
    environment:
      DATABASE_URL: postgresql://byteorder:${POSTGRES_PASSWORD:-byteorder}@postgres:5432/byteorder
      REDIS_URL: redis://redis:6379
      AUTH_MODE: ${AUTH_MODE:-self-hosted}
      DEFAULT_KITCHEN_ID: ${DEFAULT_KITCHEN_ID:-default}
      OTEL_ENDPOINT: ${OTEL_ENDPOINT:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:9001:8001"

  print-service:
    build:
      context: ../print-service
    image: ghcr.io/matts-baps/byteorder/print-service:latest
    environment:
      DATABASE_URL: postgresql://byteorder:${POSTGRES_PASSWORD:-byteorder}@postgres:5432/byteorder
      REDIS_URL: redis://redis:6379
      AUTH_MODE: ${AUTH_MODE:-self-hosted}
      OTEL_ENDPOINT: ${OTEL_ENDPOINT:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      menu-service:
        condition: service_started

  admin:
    build:
      context: ../admin
    image: ghcr.io/matts-baps/byteorder/admin:latest
    environment:
      DATABASE_URL: postgresql://byteorder:${POSTGRES_PASSWORD:-byteorder}@postgres:5432/byteorder
      MENU_SERVICE_URL: http://menu-service:8000
      ORDER_SERVICE_URL: http://order-service:8001
      AUTH_MODE: ${AUTH_MODE:-self-hosted}
      # Self-hosted auth (AUTH_MODE=self-hosted)
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-byteorder}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      DEFAULT_KITCHEN_ID: ${DEFAULT_KITCHEN_ID:-default}
      # Cloud auth (AUTH_MODE=cloud)
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY:-}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-}
      OTEL_ENDPOINT: ${OTEL_ENDPOINT:-}
    depends_on:
      - menu-service
      - order-service
    ports:
      - "3001:3001"

  frontend:
    build:
      context: ../frontend
    image: ghcr.io/matts-baps/byteorder/frontend:latest
    depends_on:
      - menu-service
      - order-service
    ports:
      - "3000:80"

volumes:
  postgres_data:

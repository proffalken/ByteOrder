registry: ghcr.io/matts-baps/byteorder
imageTag: latest

postgres:
  enabled: true          # set false to use an external PostgreSQL cluster
  password: byteorder-change-me
  storageSize: 2Gi
  # When enabled: false, provide the name of an existing Secret that contains
  # a full DSN (postgresql://user:pass@host:5432/db).
  # CloudNativePG creates <cluster-name>-app with key "uri" automatically.
  existingSecret: ""
  existingSecretKey: "uri"

# authMode controls which authentication backend is used.
# "cloud"       — multi-tenant SaaS mode; requires Clerk keys below.
# "self-hosted" — single-tenant mode; uses ADMIN_USERNAME/ADMIN_PASSWORD env vars.
authMode: cloud

clerk:
  # Option A: provide keys directly (a Secret named byteorder-clerk will be created)
  publishableKey: ""
  secretKey: ""
  # Option B: reference an existing Secret (takes precedence; inline keys are ignored)
  # The referenced Secret must contain keys "publishable-key" and "secret-key"
  existingSecretName: ""

selfHosted:
  # Credentials for the admin UI login (self-hosted mode only).
  # Option A: provide inline (a Secret named byteorder-self-hosted will be created)
  adminUsername: "admin"
  adminPassword: ""   # required in self-hosted mode
  jwtSecret: ""       # required in self-hosted mode; use a long random string
  # Option B: reference an existing Secret (takes precedence; inline values are ignored)
  # The referenced Secret must contain keys "admin-username", "admin-password", "jwt-secret"
  existingSecretName: ""
  # kitchen_id used for all requests in single-tenant mode (default: "default")
  defaultKitchenId: "default"
  # slug seeded into the kitchens table on first start — set this to something
  # meaningful (e.g. your restaurant name) if you want a nicer /k/<slug> URL
  # as a fallback. Defaults to the value of defaultKitchenId.
  defaultKitchenSlug: ""

# Name of an existing imagePullSecret for pulling images from a private registry
# e.g. a GHCR PAT secret created with:
#   kubectl create secret docker-registry ghcr-pull-secret \
#     --docker-server=ghcr.io --docker-username=<user> --docker-password=<PAT>
imagePullSecret: ""   # single secret name (shorthand)
imagePullSecrets: [] # list of secret names (use either or both)

otelEndpoint: ""

dash0:
  enabled: false   # set true when deploying to a cluster running the Dash0 operator

ingress:
  enabled: true
  frontendHost: byteorder.local
  adminHost: byteorder-admin.local
  # className: nginx
  tls:
    enabled: false
    clusterIssuer: letsencrypt-prod

services:
  frontend:
    port: 80
  admin:
    port: 3001
  menuService:
    port: 8000
  orderService:
    port: 8001

# Resource requests and limits for each workload.
# Requests drive Kubernetes scheduling; limits prevent runaway consumption.
# Override per-service in your site values file if needed.
resources:
  frontend:
    requests:
      cpu: 50m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi
  admin:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  menu-service:
    requests:
      cpu: 100m
      memory: 192Mi
    limits:
      cpu: 500m
      memory: 384Mi
  order-service:
    requests:
      cpu: 100m
      memory: 192Mi
    limits:
      cpu: 500m
      memory: 384Mi
  print-service:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  postgres:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  redis:
    requests:
      cpu: 50m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi

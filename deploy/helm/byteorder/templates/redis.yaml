apiVersion: apps/v1
kind: Deployment
metadata:
  name: byteorder-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: byteorder-redis
  template:
    metadata:
      labels:
        app: byteorder-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          {{- with $.Values.resources.redis }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: byteorder-redis
spec:
  selector:
    app: byteorder-redis
  ports:
    - port: 6379

{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: byteorder
  annotations:
    {{- if .Values.ingress.className }}
    kubernetes.io/ingress.class: {{ .Values.ingress.className }}
    {{- end }}
    {{- if and .Values.ingress.tls .Values.ingress.tls.enabled }}
    cert-manager.io/cluster-issuer: {{ .Values.ingress.tls.clusterIssuer }}
    {{- end }}
    # Disable proxy buffering so SSE streams (printer job delivery) are forwarded
    # to clients immediately rather than held in NGINX's buffer.
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    # Long timeouts for persistent SSE connections from Pi printer clients.
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.frontendHost }}
      secretName: {{ .Values.ingress.frontendHost | replace "." "-" }}-tls
    - hosts:
        - {{ .Values.ingress.adminHost }}
      secretName: {{ .Values.ingress.adminHost | replace "." "-" }}-tls
  {{- end }}
  rules:
    - host: {{ .Values.ingress.frontendHost }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: byteorder-frontend
                port:
                  number: 80
    - host: {{ .Values.ingress.adminHost }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: byteorder-admin
                port:
                  number: 3001
{{- end }}

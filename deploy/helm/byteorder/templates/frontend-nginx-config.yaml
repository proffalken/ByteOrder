apiVersion: v1
kind: ConfigMap
metadata:
  name: byteorder-frontend-nginx
data:
  default.conf: |
    server {
        listen 80;
        root /usr/share/nginx/html;
        index index.html;

        # Proxy menu-service API calls
        # X-Kitchen-ID is set by the React frontend via axios headers
        location /api/ {
            proxy_pass http://byteorder-menu-service:8000/;
            proxy_set_header Host $host;
        }

        # Proxy order-service API calls
        # X-Kitchen-ID is set by the React frontend; kitchen_id query param used for SSE
        location /orders-api/ {
            proxy_pass http://byteorder-order-service:8001/;
            proxy_set_header Host $host;
            # SSE support
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
        }

        # SPA fallback
        location / {
            try_files $uri $uri/ /index.html;
        }
    }

{{- $services := list "menu-service" "order-service" "print-service" "admin" "frontend" }}
{{- range $svc := $services }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: byteorder-{{ $svc }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: byteorder-{{ $svc }}
  template:
    metadata:
      labels:
        app: byteorder-{{ $svc }}
    spec:
      {{- $pullSecrets := list -}}
      {{- if $.Values.imagePullSecret -}}
        {{- $pullSecrets = append $pullSecrets $.Values.imagePullSecret -}}
      {{- end -}}
      {{- range $.Values.imagePullSecrets -}}
        {{- $pullSecrets = append $pullSecrets . -}}
      {{- end -}}
      {{- if $pullSecrets }}
      imagePullSecrets:
        {{- range $pullSecrets }}
        - name: {{ . }}
        {{- end }}
      {{- end }}
      containers:
        - name: {{ $svc }}
          image: {{ $.Values.registry }}/{{ $svc }}:{{ $.Values.imageTag }}
          imagePullPolicy: Always
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  {{- if $.Values.postgres.enabled }}
                  name: byteorder-postgres
                  key: url
                  {{- else }}
                  name: {{ required "postgres.existingSecret is required when postgres.enabled is false" $.Values.postgres.existingSecret }}
                  key: {{ required "postgres.existingSecretKey is required when postgres.enabled is false" $.Values.postgres.existingSecretKey }}
                  {{- end }}
            {{- if ne $svc "frontend" }}
            - name: REDIS_URL
              value: redis://byteorder-redis:6379
            - name: OTEL_ENDPOINT
              value: {{ $.Values.otelEndpoint | quote }}
            - name: OTEL_SERVICE_NAME
              value: "byteorder-{{ $svc }}"
            - name: AUTH_MODE
              value: {{ $.Values.authMode | quote }}
            {{- end }}
            {{- if eq $svc "admin" }}
            - name: MENU_SERVICE_URL
              value: http://byteorder-menu-service:8000
            - name: ORDER_SERVICE_URL
              value: http://byteorder-order-service:8001
            {{- if eq $.Values.authMode "cloud" }}
            - name: CLERK_PUBLISHABLE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ if $.Values.clerk.existingSecretName }}{{ $.Values.clerk.existingSecretName }}{{ else }}byteorder-clerk{{ end }}
                  key: publishable-key
            - name: CLERK_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ if $.Values.clerk.existingSecretName }}{{ $.Values.clerk.existingSecretName }}{{ else }}byteorder-clerk{{ end }}
                  key: secret-key
            {{- else }}
            {{- $selfHostedExistingSecret := dig "selfHosted" "existingSecretName" "" $.Values }}
            {{- $selfHostedSecret := ternary $selfHostedExistingSecret "byteorder-self-hosted" (ne $selfHostedExistingSecret "") }}
            - name: ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ $selfHostedSecret }}
                  key: admin-username
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $selfHostedSecret }}
                  key: admin-password
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ $selfHostedSecret }}
                  key: jwt-secret
            - name: DEFAULT_KITCHEN_ID
              value: {{ $.Values.selfHosted.defaultKitchenId | quote }}
            {{- end }}
            {{- end }}
            {{- if or (eq $svc "menu-service") (eq $svc "order-service") }}
            {{- if eq $.Values.authMode "self-hosted" }}
            - name: DEFAULT_KITCHEN_ID
              value: {{ $.Values.selfHosted.defaultKitchenId | quote }}
            {{- end }}
            {{- end }}
            {{- if eq $svc "menu-service" }}
            {{- if eq $.Values.authMode "self-hosted" }}
            - name: DEFAULT_KITCHEN_SLUG
              value: {{ $.Values.selfHosted.defaultKitchenSlug | default $.Values.selfHosted.defaultKitchenId | quote }}
            {{- end }}
            {{- end }}
          {{- if eq $svc "frontend" }}
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          {{- end }}
          {{- with index $.Values.resources $svc }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- if eq $svc "frontend" }}
      volumes:
        - name: nginx-config
          configMap:
            name: byteorder-frontend-nginx
      {{- end }}
{{ end }}

{{- /* Services (k8s Service objects) */ -}}
---
apiVersion: v1
kind: Service
metadata:
  name: byteorder-menu-service
spec:
  selector:
    app: byteorder-menu-service
  ports:
    - port: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: byteorder-order-service
spec:
  selector:
    app: byteorder-order-service
  ports:
    - port: 8001
---
apiVersion: v1
kind: Service
metadata:
  name: byteorder-admin
spec:
  selector:
    app: byteorder-admin
  ports:
    - port: 3001
---
apiVersion: v1
kind: Service
metadata:
  name: byteorder-frontend
spec:
  selector:
    app: byteorder-frontend
  ports:
    - port: 80

name: Build Raspberry Pi OS Image

on:
  push:
    branches: [main]
    paths:
      - "pi-printer-client/**"
      - "pi-image/**"
      - ".github/workflows/pi-image.yml"
  pull_request:
    paths:
      - "pi-printer-client/**"
      - "pi-image/**"
      - ".github/workflows/pi-image.yml"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag (e.g. v1.2.3). Leave blank for dev build."
        required: false
        default: ""

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-pi-image:
    name: Build Pi OS image (arm64 / Pi Zero 2 W, Pi 3, Pi 4)
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            qemu-user-static binfmt-support xz-utils parted \
            e2fsprogs wget bc

      - name: Download official Pi OS Lite (arm64)
        run: |
          wget -q --show-progress \
            https://downloads.raspberrypi.com/raspios_lite_arm64_latest \
            -O raspios.img.xz
          xz --decompress raspios.img.xz

      # The official image ships with a root partition sized to just fit the
      # OS. Expand by 1.5 GB to accommodate Python packages + BLE stack.
      - name: Expand root partition
        run: |
          dd if=/dev/zero bs=1M count=1536 >> raspios.img
          sudo parted raspios.img --script resizepart 2 100%
          LOOP=$(sudo losetup --find --show --partscan raspios.img)
          sudo e2fsck -f -y "${LOOP}p2"
          sudo resize2fs "${LOOP}p2"
          sudo losetup --detach "${LOOP}"

      - name: Mount image
        run: |
          LOOP=$(sudo losetup --find --show --partscan raspios.img)
          echo "LOOP=${LOOP}" >> "$GITHUB_ENV"
          sudo mkdir -p /mnt/pi
          sudo mount "${LOOP}p2" /mnt/pi
          sudo mkdir -p /mnt/pi/boot/firmware
          sudo mount "${LOOP}p1" /mnt/pi/boot/firmware
          sudo mount --bind /dev     /mnt/pi/dev
          sudo mount --bind /dev/pts /mnt/pi/dev/pts
          sudo mount --bind /proc    /mnt/pi/proc
          sudo mount --bind /sys     /mnt/pi/sys

      - name: Download ble-print-server
        run: |
          mkdir ble-print-server
          curl -fsSL https://github.com/proffalken/ble-print-server/archive/refs/heads/main.tar.gz \
            | tar -xz -C ble-print-server --strip-components=1

      - name: Inject ByteOrder printer client
        run: |
          # pi-printer-client
          sudo mkdir -p /mnt/pi/opt/byteorder-printer
          sudo cp -r pi-printer-client/byteorder_printer \
            /mnt/pi/opt/byteorder-printer/byteorder_printer
          sudo cp pi-printer-client/requirements.txt \
            /mnt/pi/opt/byteorder-printer/requirements.txt

          # ble-print-server
          sudo mkdir -p /mnt/pi/opt/ble-print-server
          sudo cp -r ble-print-server/. /mnt/pi/opt/ble-print-server/

          # Systemd units
          sudo cp pi-printer-client/systemd/byteorder-print-client.service \
            /mnt/pi/etc/systemd/system/byteorder-print-client.service
          sudo cp pi-printer-client/systemd/byteorder-ble-printer.service \
            /mnt/pi/etc/systemd/system/byteorder-ble-printer.service

          # Config directory (populated by setup portal on first boot)
          sudo mkdir -p /mnt/pi/etc/byteorder-printer

          # Enable SSH on first boot (headless)
          sudo touch /mnt/pi/boot/firmware/ssh

          # Run chroot setup
          sudo cp pi-image/scripts/install-chroot.sh /mnt/pi/tmp/install-chroot.sh
          sudo cp /usr/bin/qemu-aarch64-static /mnt/pi/usr/bin/
          sudo chroot /mnt/pi /bin/bash /tmp/install-chroot.sh
          sudo rm /mnt/pi/tmp/install-chroot.sh
          sudo rm /mnt/pi/usr/bin/qemu-aarch64-static

      - name: Unmount image
        if: always()
        run: |
          sudo umount /mnt/pi/sys          || true
          sudo umount /mnt/pi/proc         || true
          sudo umount /mnt/pi/dev/pts      || true
          sudo umount /mnt/pi/dev          || true
          sudo umount /mnt/pi/boot/firmware || true
          sudo umount /mnt/pi              || true
          sudo losetup --detach "${LOOP}"  || true

      - name: Repack image
        id: image
        run: |
          if [ -n "${{ github.event.inputs.release_tag }}" ]; then
            VERSION="${{ github.event.inputs.release_tag }}"
          else
            VERSION="$(git rev-parse --short HEAD)"
          fi
          DEST="byteorder-pi-${VERSION}.img.xz"
          xz --compress --threads 0 --stdout raspios.img > "${DEST}"
          echo "path=${DEST}"       >> "$GITHUB_OUTPUT"
          echo "name=${DEST}"       >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.image.outputs.name }}
          path: ${{ steps.image.outputs.path }}
          retention-days: 14

      - name: Create GitHub Release
        if: ${{ github.event.inputs.release_tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.image.outputs.version }}
          name: "ByteOrder Pi Image ${{ steps.image.outputs.version }}"
          body: |
            ## ByteOrder Raspberry Pi OS Image — ${{ steps.image.outputs.version }}

            Official Raspberry Pi OS Lite (64-bit arm64) with the ByteOrder
            BLE printer client pre-installed and running natively via systemd.

            **Compatible with:** Pi Zero 2 W, Pi 3, Pi 4, Pi 5.

            ### Flashing

            Flash with [Raspberry Pi Imager](https://www.raspberrypi.com/software/):
            1. Choose **Use custom** and select `${{ steps.image.outputs.name }}`.
            2. Click the settings icon to set your SSH key before writing.
            3. **Do not pre-configure WiFi** — the printer will set this up itself.

            ### First-boot setup

            1. Power on the Pi. It will broadcast a WiFi AP named **`ByteOrder-XXXXXX`**.
            2. Connect your phone to that network — a setup portal will open automatically.
            3. Enter your WiFi credentials and the ByteOrder server URL, then tap **Connect & Save**.
            4. Once connected, go to **Admin → Printers** and claim the printer using the
               6-character code shown in the portal.
          files: ${{ steps.image.outputs.path }}
          fail_on_unmatched_files: true

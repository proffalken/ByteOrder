name: Build Raspberry Pi OS Image

on:
  push:
    branches: [main]
    paths:
      - "print-service/**"
      - "pi-image/**"
      - ".github/workflows/pi-image.yml"
  pull_request:
    paths:
      - "print-service/**"
      - "pi-image/**"
      - ".github/workflows/pi-image.yml"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag (e.g. v1.2.3). Leave blank for dev build."
        required: false
        default: ""

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-pi-image:
    name: Build Pi OS image (arm64 / Pi Zero 2 W, Pi 3, Pi 4)
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            qemu-user-static binfmt-support xz-utils parted \
            e2fsprogs wget bc

      - name: Download official Pi OS Lite (arm64)
        run: |
          wget -q --show-progress \
            https://downloads.raspberrypi.com/raspios_lite_arm64_latest \
            -O raspios.img.xz
          xz --decompress raspios.img.xz

      # The official image ships with a root partition sized to just fit the
      # OS. Expand by 1.5 GB to accommodate Python packages + OpenTelemetry.
      - name: Expand root partition
        run: |
          dd if=/dev/zero bs=1M count=1536 >> raspios.img
          sudo parted raspios.img --script resizepart 2 100%
          LOOP=$(sudo losetup --find --show --partscan raspios.img)
          sudo e2fsck -f -y "${LOOP}p2"
          sudo resize2fs "${LOOP}p2"
          sudo losetup --detach "${LOOP}"

      - name: Mount image
        run: |
          LOOP=$(sudo losetup --find --show --partscan raspios.img)
          echo "LOOP=${LOOP}" >> "$GITHUB_ENV"
          sudo mkdir -p /mnt/pi
          sudo mount "${LOOP}p2" /mnt/pi
          sudo mkdir -p /mnt/pi/boot/firmware
          sudo mount "${LOOP}p1" /mnt/pi/boot/firmware
          sudo mount --bind /dev     /mnt/pi/dev
          sudo mount --bind /dev/pts /mnt/pi/dev/pts
          sudo mount --bind /proc    /mnt/pi/proc
          sudo mount --bind /sys     /mnt/pi/sys

      - name: Inject ByteOrder print service
        run: |
          sudo mkdir -p /mnt/pi/opt/byteorder-print
          sudo cp -r print-service/app /mnt/pi/opt/byteorder-print/app
          sudo cp pi-image/requirements-pi.txt \
            /mnt/pi/opt/byteorder-print/requirements-pi.txt

          sudo cp pi-image/files/byteorder-print.service \
            /mnt/pi/etc/systemd/system/byteorder-print.service

          sudo mkdir -p /mnt/pi/etc/byteorder
          sudo cp pi-image/files/print-service.env.template \
            /mnt/pi/etc/byteorder/print-service.env
          sudo chmod 750 /mnt/pi/etc/byteorder
          sudo chmod 640 /mnt/pi/etc/byteorder/print-service.env

          # Copy install script and QEMU binary into the image, run chroot.
          sudo cp pi-image/scripts/install-chroot.sh /mnt/pi/tmp/install-chroot.sh
          sudo cp /usr/bin/qemu-aarch64-static /mnt/pi/usr/bin/
          sudo chroot /mnt/pi /bin/bash /tmp/install-chroot.sh
          sudo rm /mnt/pi/tmp/install-chroot.sh
          sudo rm /mnt/pi/usr/bin/qemu-aarch64-static

      - name: Unmount image
        if: always()
        run: |
          sudo umount /mnt/pi/sys          || true
          sudo umount /mnt/pi/proc         || true
          sudo umount /mnt/pi/dev/pts      || true
          sudo umount /mnt/pi/dev          || true
          sudo umount /mnt/pi/boot/firmware || true
          sudo umount /mnt/pi              || true
          sudo losetup --detach "${LOOP}"  || true

      - name: Repack image
        id: image
        run: |
          if [ -n "${{ github.event.inputs.release_tag }}" ]; then
            VERSION="${{ github.event.inputs.release_tag }}"
          else
            VERSION="$(git rev-parse --short HEAD)"
          fi
          DEST="byteorder-pi-${VERSION}.img.xz"
          xz --compress --threads 0 --stdout raspios.img > "${DEST}"
          echo "path=${DEST}"       >> "$GITHUB_OUTPUT"
          echo "name=${DEST}"       >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.image.outputs.name }}
          path: ${{ steps.image.outputs.path }}
          retention-days: 14

      - name: Create GitHub Release
        if: ${{ github.event.inputs.release_tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.image.outputs.version }}
          name: "ByteOrder Pi Image ${{ steps.image.outputs.version }}"
          body: |
            ## ByteOrder Raspberry Pi OS Image — ${{ steps.image.outputs.version }}

            Official Raspberry Pi OS Lite (64-bit arm64) with the ByteOrder
            print service pre-installed and running natively via systemd.

            **Compatible with:** Pi Zero 2 W, Pi 3, Pi 4, Pi 5.

            ### Flashing

            Flash with [Raspberry Pi Imager](https://www.raspberrypi.com/software/):
            1. Choose **Use custom** and select `${{ steps.image.outputs.name }}`.
            2. Click the settings icon to set hostname, SSH key, and Wi-Fi before writing.

            ### First-boot configuration

            Edit `/etc/byteorder/print-service.env` and set:

            ```
            REDIS_URL=redis://<host>:6379
            DATABASE_URL=postgresql://byteorder:<pass>@<host>:5432/byteorder
            # OTEL_ENDPOINT=http://<byteorder-host>:4318
            ```

            Then reboot or run `sudo systemctl start byteorder-print`.
          files: ${{ steps.image.outputs.path }}
          fail_on_unmatched_files: true
